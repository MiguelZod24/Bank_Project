name: QA Automation Tests
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    # Todos los días a las 6:00 AM UTC = 8:00 AM España
    - cron: '0 6 * * *'

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
      # Paso 1 — descarga el código
      - name: Checkout del código
        uses: actions/checkout@v4

      # Paso 2 — instala Python 3.11
      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Paso 3 — instala Java (necesario para Allure)
      - name: Instalar Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # Paso 4 — instala Allure CLI
      - name: Instalar Allure
        run: |
          wget -q https://github.com/allure-framework/allure2/releases/download/2.27.0/allure-2.27.0.tgz
          tar -zxf allure-2.27.0.tgz
          sudo mv allure-2.27.0 /opt/allure
          sudo ln -s /opt/allure/bin/allure /usr/local/bin/allure

      # Paso 5 — instala las dependencias de Python
      - name: Instalar dependencias
        run: |
          pip install pytest
          pip install playwright
          pip install pytest-playwright
          pip install faker
          pip install pytest-html
          pip install allure-pytest

      # Paso 6 — instala los navegadores de Playwright
      - name: Instalar navegadores Playwright
        run: playwright install --with-deps chromium

       # Paso 7 — ejecuta los tests con Allure y pytest-html
      - name: Ejecutar tests
        run: pytest tests/ -v --html=reports/report.html --self-contained-html --alluredir=reports/allure-results

      # Paso 8 — genera el reporte Allure
      - name: Generar reporte Allure
        if: always()
        run: allure generate reports/allure-results -o reports/allure-report --clean

      # Paso 9 — guarda ambos reportes como artefactos descargables
      - name: Guardar reportes
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: reportes-tests
          path: reports/

  # Job de análisis IA — corre siempre después del job tests, incluso si hay tests fallidos
  analisis-ia:
    runs-on: ubuntu-latest
    needs: tests
    if: always()

    steps:
      # Descarga el código del repo para acceder a scripts/analisis_ia.py
      - name: Checkout del código
        uses: actions/checkout@v4

      # Instala Python 3.11
      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Instala requests, única dependencia del script de análisis
      - name: Instalar dependencias del script
        run: pip install requests

      # Descarga el artefacto generado por el job tests (contiene allure-results y report.html)
      - name: Descargar artefacto reportes-tests
        uses: actions/download-artifact@v4
        with:
          name: reportes-tests
          path: reports/

      # Ejecuta el análisis con GitHub Models (GPT-4o) y genera reporte_ia.html
      - name: Ejecutar análisis IA
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: python scripts/analisis_ia.py

      # Sube el reporte HTML y el JSON de análisis como artefacto (el JSON lo consume crear_issues.py)
      - name: Subir reporte IA
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: reporte-ia
          path: |
            reports/reporte_ia.html
            reports/analisis_ia.json

  # Job de creación de Issues — corre siempre después del análisis IA
  crear-issues:
    runs-on: ubuntu-latest
    needs: analisis-ia
    if: always()

    steps:
      # Descarga el código del repo para acceder a scripts/crear_issues.py
      - name: Checkout del código
        uses: actions/checkout@v4

      # Instala Python 3.11
      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Instala requests, única dependencia del script
      - name: Instalar dependencias del script
        run: pip install requests

      # Descarga el artefacto reporte-ia que contiene analisis_ia.json
      - name: Descargar artefacto reporte-ia
        uses: actions/download-artifact@v4
        with:
          name: reporte-ia
          path: reports/

      # Crea Issues en GitHub por cada test fallido detectado por la IA
      - name: Crear Issues para tests fallidos
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python scripts/crear_issues.py